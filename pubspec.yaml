name: dms_mobile
description: "Document Management System Mobile Application"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI Icons
  cupertino_icons: ^1.0.8

  # Networking
  http: ^1.6.0
  dio: ^5.9.2

  # State Management
  provider: ^6.1.5+1

  # Storage
  flutter_secure_storage: ^10.3.1
  shared_preferences: ^2.5.5

  # Date Formatting
  intl: ^0.20.2

  # File Handling
  image_picker: ^1.2.2
  permission_handler: ^12.0.3
  connectivity_plus: ^7.1.1
  file_picker: ^8.0.0
  path_provider: ^2.1.6
  open_file: ^3.5.11

  # Toast Messages
  fluttertoast: ^8.2.12

  # Navigation
  go_router: ^14.8.1

  # URL Launcher
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/